<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Subjects - StudyHub</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f7f7f7;
    }
    .container {
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }
    h1 {
      text-align: center;
    }
    .subjects {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
    }
    .subject-card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      width: 200px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
      cursor: pointer;
    }
    .subject-card:hover {
      transform: translateY(-5px);
    }
    .subject-card img {
      width: 100px;
      height: 100px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Select a Subject</h1>
    <div class="subjects">
      <div class="subject-card" onclick="location.href='physics.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/3176/3176297.png" alt="Physics" />
        <p>Physics</p>
      </div>
      <div class="subject-card" onclick="location.href='chemistry.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/2907/2907933.png" alt="Chemistry" />
        <p>Chemistry</p>
      </div>
      <div class="subject-card" onclick="location.href='biology.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/4086/4086679.png" alt="Biology" />
        <p>Biology</p>
      </div>
      <div class="subject-card" onclick="location.href='sst.html'">
        <img src="https://cdn-icons-png.flaticon.com/512/2331/2331966.png" alt="SST" />
        <p>SST</p>
      </div>
    </div>
  </div>
  <footer style="text-align: center; margin-top: 20px;">made by utkarsh-kush</footer>
</body>
</html>
